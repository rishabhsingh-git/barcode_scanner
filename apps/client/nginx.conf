server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://server:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Large upload support - increased for bulk uploads
        client_max_body_size 2G;
        proxy_read_timeout 1800s;  # 30 minutes
        proxy_send_timeout 1800s;  # 30 minutes
        proxy_request_buffering off;  # Stream uploads instead of buffering
        proxy_buffering off;  # Disable buffering for large uploads
    }
}

